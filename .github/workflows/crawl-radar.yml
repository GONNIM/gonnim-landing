name: Sprint Radar · Playwright crawlers

on:
  # 스케줄 비활성: 원티드가 CloudFront WAF 로 GitHub Runner US IP 차단 (2026-07-17 확정)
  # 실 크롤은 로컬 Mac crontab 08:00 KST · scripts/crawl-wanted-gigs.sh
  # 수동 dispatch 는 유지 (테스트·향후 residential proxy 도입 시 재활성 대비)
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Run crawlers
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm exec tsx scripts/crawl-all.ts

      - name: Upload diagnostics (screenshots + logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-diagnostics
          path: |
            /tmp/*.log
            /tmp/wanted-gigs-*.png
          if-no-files-found: ignore
